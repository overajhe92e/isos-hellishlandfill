[manifest]
version = "0.0.1"
dump_lua = true
priority = 1000

[[patches]]
[patches.pattern]
target = "globals.lua"
pattern = "DARK_EDITION = {0,0,0,1},"
position = "after"
payload = """
OMEGABLACK = HEX("000000"),
OMEGARED = HEX("ff0000"),
OMEGAWHITE = HEX("ffffff"),
NIGHTMARE_BLUE = HEX("0000ff"),
NIGHTMARE_PURPLE = HEX("800080"),
"""
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/misc_functions.lua"
pattern = "dark_edition = G.C.DARK_EDITION,"
position = "after"
payload = """
ocstobal_omegablack = G.C.OMEGARED,
ocstobal_omegared = G.C.OMEGARED,
ocstobal_omegawhite = G.C.OMEGAWHITE,
ocstobal_nightmare_blue = G.C.NIGHTMARE_BLUE,
ocstobal_nightmare_purple = G.C.NIGHTMARE_PURPLE,
"""
match_indent = true